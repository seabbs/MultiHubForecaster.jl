# MANAGED by EpiAwarePackageTools.scaffold — do not edit by hand.
name: Downstream

# Opt-in reverse-dependency tests: checks that this PR's version of the package
# does not break packages that depend on it. This is expensive, so it does not
# run on every push. Trigger it by adding the `downstream` (or `reverse-deps`)
# label to a PR, or by running it manually from the Actions tab.
#
# The downstream list below starts empty. Add entries as packages start
# depending on this one (see the commented example), then label a PR to run
# them. This list is package-owned: edit `downstreams` to fit the package and
# `scaffold_update` keeps what you set, while the rest of this file stays
# managed.

on:
  pull_request:
    types: [labeled]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  downstream:
    # Only the opt-in label triggers on PRs; manual dispatch always runs.
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.label.name == 'downstream' ||
      github.event.label.name == 'reverse-deps'
    uses: EpiAware/.github/.github/workflows/downstream.yml@main
    secrets: inherit  # pragma: allowlist secret
    with:
      # JSON list of downstreams. Each entry needs `repo` (owner/name) and may
      # set `group` (GROUP env for the downstream suite) and `allow_fail` (true
      # keeps a failure from reding the run). Empty by default; e.g.:
      #   [{"repo":"seabbs/SomeDownstream.jl","group":"All"}]
      downstreams: '[]'
