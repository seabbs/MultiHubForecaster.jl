# MANAGED by EpiAwarePackageTools.scaffold — do not edit by hand.
name: Registrability

# Registration-safety checks (thin caller of the EpiAware/.github reusable):
# that every dependency is registrable, and that no org reverse-dependency's
# compat is stranded by the version under test. Runs when a change could
# affect registrability (a Project.toml edit), on demand, and on main so the
# default branch is always known-registrable.
#
# The reverse-dep check is a warning by default; a breaking release
# legitimately strands a downstream bound. Set fail_on_revdep_break: true on
# the caller job to gate on it.

on:
  push:
    branches:
      - main
    paths:
      - 'Project.toml'
  pull_request:
    paths:
      - 'Project.toml'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  registrability:
    uses: EpiAware/.github/.github/workflows/registrability.yml@0c1b4ec28e30933f3ea50513d0aca40592cf512f
    secrets: inherit  # pragma: allowlist secret
